<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabata Pro Timer</title>
    <!-- Roboto Mono for zero-shake digits -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --apple-orange: #FF9F0A;
            --apple-dark-gray: #333333;
            --apple-light-gray: #A5A5A5;
            --apple-red: #FF3B30;
            --work-green: #30D158;
            --rest-yellow: #FFCC00; 
            --prep-blue: #0A84FF;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Section: Timer */
        .timer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #status-indicator {
            font-family: 'Roboto Mono', monospace;
            font-size: 5rem;
            font-weight: bold;
            width: 220px; 
            text-align: center;
            margin-right: 10px;
        }

        .clock-wrapper {
            display: flex;
            align-items: baseline;
            font-family: 'Roboto Mono', monospace;
            user-select: none;
        }

        .time-unit {
            font-size: 12vw;
            width: 14.5vw; 
            text-align: center;
        }

        .colon {
            font-size: 12vw;
            width: 4vw;
            text-align: center;
        }

        .tenths {
            font-size: 9.6vw; /* 80% size */
            width: 10vw;
            margin-left: 2px;
            color: var(--apple-light-gray);
        }

        /* Bottom Section: Controls */
        .controls-bar {
            background-color: #1c1c1e;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            border-top: 1px solid #333;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        label {
            font-size: 0.75rem;
            color: var(--apple-light-gray);
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        input {
            background: var(--apple-dark-gray);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.2rem;
            width: 90px;
            text-align: center;
            font-family: 'Roboto Mono', monospace;
        }

        .btn {
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            min-width: 120px;
            color: white;
        }

        .btn:active { opacity: 0.7; }

        #updateBtn { background-color: var(--apple-light-gray); color: black; }
        #startBtn { background-color: var(--apple-orange); }
        #resetBtn { background-color: var(--apple-dark-gray); }

        /* Landscape Mobile optimization */
        @media (max-height: 500px) {
            #status-indicator { font-size: 3.5rem; width: 160px; }
            .time-unit, .colon { font-size: 18vh; width: 22vh; }
            .colon { width: 6vh; }
            .tenths { font-size: 14.4vh; width: 14vh; }
            .controls-bar { padding: 10px; gap: 15px; }
            .btn { padding: 10px 18px; min-width: 90px; }
            input { width: 80px; padding: 8px; }
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <div id="status-indicator" style="color: var(--prep-blue);">S</div>
        
        <div class="clock-wrapper">
            <span id="hh" class="time-unit">00</span>
            <span class="colon">:</span>
            <span id="mm" class="time-unit">00</span>
            <span class="colon">:</span>
            <span id="ss" class="time-unit">10</span>
            <span id="tt" class="tenths">.0</span>
        </div>
    </div>

    <div class="controls-bar">
        <div class="input-group">
            <label>Work</label>
            <input type="text" id="workInput" value="00:20" maxlength="5">
        </div>
        <div class="input-group">
            <label>Rest</label>
            <input type="text" id="restInput" value="00:10" maxlength="5">
        </div>

        <button id="updateBtn" class="btn" onclick="updateSettings()">Update</button>
        <button id="startBtn" class="btn" onclick="toggleTimer()">Start</button>
        <button id="resetBtn" class="btn" onclick="resetTimer()">Reset</button>
    </div>

    <script>
        let audioCtx = null;
        let timerIdx = null;
        let isRunning = false;
        let phase = 'START'; // START, WORK, REST
        let round = 1;
        let timeLeft = 10000;
        let lastBeepSec = -1;

        // Display Elements
        const elH = document.getElementById('hh');
        const elM = document.getElementById('mm');
        const elS = document.getElementById('ss');
        const elT = document.getElementById('tt');
        const statusDisplay = document.getElementById('status-indicator');
        const startBtn = document.getElementById('startBtn');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        const playBoxingBellSingle = () => {
            initAudio();
            const now = audioCtx.currentTime;
            const frequencies = [880, 1760, 2460, 3504]; 

            frequencies.forEach((freq, index) => {
                // Main tone and +5% pitch tone
                [freq, freq * 1.05].forEach(f => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now);

                    gain.gain.setValueAtTime(0.2 / frequencies.length, now);
                    const decay = (1.5 - (index * 0.2)) * 0.5; 
                    gain.gain.exponentialRampToValueAtTime(0.01, now + decay);

                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(now + decay);
                });
            });
        };

        function playBoxingBellDouble() {
            playBoxingBellSingle();
            setTimeout(playBoxingBellSingle, 500); 
        }

        function playBeep(freq, duration) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playTripleBeep() {
            [0, 0.4, 0.8].forEach(delay => {
                setTimeout(() => playBeep(528, 0.3), delay * 1000);
            });
        }

        function parseTime(str) {
            const p = str.split(':');
            const m = parseInt(p[0]) || 0;
            const s = parseInt(p[1]) || 0;
            return (m * 60 + s) * 1000;
        }

        function updateUI() {
            const ms = Math.max(0, timeLeft);
            const totalSec = ms / 1000;
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = Math.floor(totalSec % 60);
            const t = Math.floor((ms % 1000) / 100);

            elH.innerText = h.toString().padStart(2, '0');
            elM.innerText = m.toString().padStart(2, '0');
            elS.innerText = s.toString().padStart(2, '0');
            elT.innerText = `.${t}`;

            const currentSec = Math.ceil(ms / 1000);
            if (isRunning && currentSec <= 3 && currentSec > 0 && currentSec !== lastBeepSec) {
                playBeep(528, 0.2);
                lastBeepSec = currentSec;
            }

            if (phase === 'START') {
                statusDisplay.innerText = 'S';
                statusDisplay.style.color = 'var(--prep-blue)';
            } else if (phase === 'WORK') {
                statusDisplay.innerText = 'W' + round;
                statusDisplay.style.color = 'var(--work-green)';
            } else {
                statusDisplay.innerText = 'R' + round;
                statusDisplay.style.color = 'var(--rest-yellow)';
            }
        }

        function toggleTimer() {
            initAudio();
            if (isRunning) {
                stopTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            isRunning = true;
            startBtn.innerText = 'Stop';
            startBtn.style.backgroundColor = 'var(--apple-red)';
            
            timerIdx = setInterval(() => {
                timeLeft -= 100;
                
                if (timeLeft <= 0) {
                    const workMs = parseTime(document.getElementById('workInput').value);
                    const restMs = parseTime(document.getElementById('restInput').value);

                    if (phase === 'START') {
                        playBoxingBellDouble();
                        phase = 'WORK';
                        timeLeft = workMs;
                    } else if (phase === 'WORK') {
                        playTripleBeep();
                        phase = 'REST';
                        timeLeft = restMs;
                    } else {
                        playBoxingBellDouble();
                        phase = 'WORK';
                        round++;
                        timeLeft = workMs;
                    }
                    lastBeepSec = -1;
                }
                updateUI();
            }, 100);
        }

        function stopTimer() {
            isRunning = false;
            clearInterval(timerIdx);
            startBtn.innerText = 'Start';
            startBtn.style.backgroundColor = 'var(--apple-orange)';
        }

        function updateSettings() {
            resetTimer();
        }

        function resetTimer() {
            stopTimer();
            phase = 'START';
            round = 1;
            timeLeft = 10000; // Reset to 10s prep
            lastBeepSec = -1;
            updateUI();
        }

        // Initial UI Draw
        updateUI();
    </script>
</body>
</html>
